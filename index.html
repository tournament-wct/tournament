<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>вҡҪ Stake World Chat Tournament 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0f1923;--bg2:#162330;--bg3:#1a2d3d;--border:#1e3448;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#f59e0b;--sidebar:220px;}
[data-theme="light"]{--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* в”Җв”Җ App layout в”Җв”Җ */
.app{display:flex;flex:1;height:100vh;overflow:hidden;}

/* в”Җв”Җ Sidebar в”Җв”Җ */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sidebar-logo-icon{font-size:22px;}
.sidebar-logo-text{font-size:13px;font-weight:700;line-height:1.2;}
.sidebar-logo-sub{font-size:9px;color:var(--text3);}
.sidebar-nav{padding:8px 0;flex:1;}
.sidebar-section{padding:8px 14px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:13px;color:var(--text2);}
.sidebar-item:hover{background:var(--bg3);color:var(--text);}
.sidebar-item.active{background:rgba(96,165,250,.08);border-left-color:var(--blue);color:var(--blue);}
.sidebar-item-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-item-label{flex:1;}
.sidebar-item-badge{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.sidebar-item.active .sidebar-item-badge{background:rgba(96,165,250,.15);color:var(--blue);}
.sidebar-divider{height:1px;background:var(--border);margin:6px 14px;}
.sidebar-country{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:12px;color:var(--text2);}
.sidebar-country:hover{background:var(--bg3);color:var(--text);}
.sidebar-country.active{background:rgba(96,165,250,.08);border-left-color:var(--blue);color:var(--blue);}
.sidebar-country-flag{font-size:14px;}
.sidebar-country-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-country-score{font-size:11px;font-weight:700;color:var(--green);}

/* в”Җв”Җ Main в”Җв”Җ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* в”Җв”Җ Topbar в”Җв”Җ */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-size:14px;font-weight:700;color:var(--text);}
.topbar-days{font-size:11px;color:var(--amber);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);padding:2px 8px;border-radius:5px;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.badge-live{background:rgba(74,222,128,.1);color:var(--green);font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid rgba(74,222,128,.3);display:flex;align-items:center;gap:5px;}
.badge-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{border:none;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.8;}
.btn-green{background:#1a9e6e;color:#fff;}
.btn-icon{background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:6px 10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* в”Җв”Җ Countdown в”Җв”Җ */
.countdown-bar{background:linear-gradient(90deg,rgba(133,79,11,.15),var(--bg));border-bottom:1px solid rgba(133,79,11,.3);padding:5px 1.5rem;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.cd-label{font-size:10px;color:var(--amber);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.cd-timer{display:flex;gap:5px;align-items:center;}
.cd-unit{text-align:center;}
.cd-val{font-size:15px;font-weight:800;color:var(--text);}
.cd-ulabel{font-size:8px;color:var(--amber);text-transform:uppercase;}
.cd-sep{font-size:15px;color:var(--amber);}

/* в”Җв”Җ Stats bar в”Җв”Җ */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat-box{background:var(--bg2);padding:8px 16px;text-align:center;}
.stat-value{font-size:18px;font-weight:700;}
.stat-label{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.5px;}

/* в”Җв”Җ Live bar в”Җв”Җ */
.live-bar{background:linear-gradient(90deg,rgba(96,165,250,.06),var(--bg));border-bottom:1px solid rgba(96,165,250,.2);padding:4px 1.5rem;display:none;align-items:center;gap:8px;font-size:11px;flex-shrink:0;}
.live-bar.active{display:flex;}
.live-bar-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 1s infinite;}

/* в”Җв”Җ Toolbar в”Җв”Җ */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.search-input,.filter-select{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--text);outline:none;}
.search-input{width:180px;}
.search-input:focus,.filter-select:focus{border-color:var(--blue);}
.toolbar-right{margin-left:auto;font-size:11px;color:var(--text3);}
.btn-suspense{background:linear-gradient(90deg,#7c3aed,#4f46e5);color:#fff;}

/* в”Җв”Җ Content в”Җв”Җ */
.page-content{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:1.25rem 0 .75rem;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.layout-2col{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}

/* в”Җв”Җ Country grid в”Җв”Җ */
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.country-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;}
.country-card:hover{border-color:var(--blue);transform:translateY(-1px);}
.country-card.rank-1{border-color:#b8860b;}
.country-card.rank-2{border-color:#4a5568;}
.country-card.rank-3{border-color:#7b4a1a;}
.country-card.overtaken{animation:overtake 1s ease;}
@keyframes overtake{0%{transform:scale(1)}50%{transform:scale(1.05);border-color:var(--green);}100%{transform:scale(1);}}
.country-rank{font-size:18px;margin-bottom:4px;}
.country-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.country-won{font-size:22px;font-weight:800;color:var(--green);}
.country-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.country-winrate{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;color:var(--amber);}
.country-link{font-size:10px;color:var(--text3);text-decoration:none;display:block;margin-top:6px;}
.country-link:hover{color:var(--blue);}

/* в”Җв”Җ Podium в”Җв”Җ */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem;}
.podium-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:transform .2s;}
.podium-card:hover{transform:translateY(-2px);}
.podium-card.rank-1{border-color:#b8860b;}
.podium-card.rank-2{border-color:#4a5568;}
.podium-card.rank-3{border-color:#7b4a1a;}
.podium-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 6px;background:var(--bg3);overflow:hidden;border:2px solid var(--border);}
.podium-avatar img{width:100%;height:100%;object-fit:cover;}
.podium-medal{font-size:22px;margin-bottom:4px;}
.podium-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.podium-score{font-size:26px;font-weight:800;color:var(--green);}
.podium-winrate{font-size:12px;color:var(--amber);margin-top:2px;}
.podium-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.podium-badges{display:flex;justify-content:center;gap:4px;margin-top:6px;flex-wrap:wrap;}

/* в”Җв”Җ Table в”Җв”Җ */
table{width:100%;border-collapse:collapse;}
th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text2);}
th.right{text-align:right;}
td{padding:8px 10px;border-bottom:1px solid var(--bg);font-size:12px;background:var(--bg2);transition:background .1s;}
tr:hover td{background:var(--bg3);}
tr.today td{background:rgba(74,222,128,.04);border-left:2px solid var(--green);}
tr.clickable{cursor:pointer;}
.rank-cell{font-weight:700;color:var(--text3);width:36px;}
.username-cell{display:flex;align-items:center;gap:8px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--bg3);overflow:hidden;flex-shrink:0;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-name{font-weight:600;}
.user-badges{display:flex;gap:2px;}
.won-cell{text-align:right;font-weight:700;color:var(--green);}
.lost-cell{text-align:right;color:var(--red);}
.cashout-cell{text-align:right;color:var(--orange);}
.adjusted-cell{text-align:right;color:var(--purple);}
.void-cell{text-align:right;color:var(--text2);}
.unk-cell{text-align:right;color:var(--text3);}
.total-cell{text-align:right;color:var(--text2);}
.winrate-cell{text-align:right;color:var(--amber);font-weight:600;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:3px;}
.progress-fill{height:100%;background:#1a9e6e;border-radius:2px;}
.today-badge{background:rgba(74,222,128,.15);color:var(--green);font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid rgba(74,222,128,.3);}
.badge-trophy{font-size:13px;cursor:help;}

/* в”Җв”Җ Bet chips в”Җв”Җ */
.bet-group{margin-bottom:8px;}
.bet-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.bet-chips{display:flex;flex-wrap:wrap;gap:4px;}
.bet-chip{font-size:10px;font-family:monospace;padding:3px 7px;border-radius:4px;text-decoration:none;border:1px solid transparent;transition:opacity .2s;}
.bet-chip:hover{opacity:.7;}
.bet-chip.won{background:#052e16;color:var(--green);border-color:#166534;}
.bet-chip.lost{background:#2d0a0a;color:var(--red);border-color:#7f1d1d;}
.bet-chip.cashout{background:#1c1a05;color:var(--orange);border-color:#854f0b;}
.bet-chip.adjusted{background:#1a0a2e;color:var(--purple);border-color:#5b21b6;}
.bet-chip.void{background:rgba(0,0,0,.2);color:var(--text2);border-color:var(--border);}
.bet-chip.unknown,.bet-chip.pending{background:var(--bg3);color:var(--text3);border-color:var(--border);}

/* в”Җв”Җ Timeline в”Җв”Җ */
.timeline{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.timeline-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.timeline-title{font-size:12px;font-weight:700;flex:1;}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
.timeline-body{max-height:400px;overflow-y:auto;}
.tl-item{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid var(--border);animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.tl-flag{font-size:13px;}
.tl-author{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.tl-author:hover{color:var(--blue);}
.tl-bet{font-size:10px;font-family:monospace;color:var(--text3);}
.tl-status{font-size:11px;}
.tl-odds{font-size:10px;color:var(--amber);}
.tl-time{font-size:10px;color:var(--text3);white-space:nowrap;}
.tl-empty{padding:20px;text-align:center;color:var(--text3);font-size:12px;}

/* в”Җв”Җ Widgets в”Җв”Җ */
.widget-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.widget{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.widget-icon{font-size:24px;}
.widget-info{flex:1;}
.widget-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.widget-value{font-size:15px;font-weight:800;color:var(--text);cursor:pointer;}
.widget-value:hover{color:var(--blue);}
.widget-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.widget-big{font-size:20px;font-weight:800;}

/* в”Җв”Җ BotD в”Җв”Җ */
.botd{background:linear-gradient(135deg,rgba(251,191,36,.08),var(--bg2));border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:14px;margin-bottom:1rem;}
.botd-label{font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;}
.botd-main{display:flex;align-items:center;gap:12px;}
.botd-author{font-size:15px;font-weight:800;cursor:pointer;}
.botd-author:hover{color:var(--blue);}
.botd-odds{font-size:26px;font-weight:900;color:var(--amber);}

/* в”Җв”Җ Risky в”Җв”Җ */
.risky-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:6px;margin-bottom:4px;border:1px solid var(--border);}
.risky-rank{font-size:12px;color:var(--text3);width:20px;font-weight:700;}
.risky-author{font-size:12px;color:var(--text);flex:1;font-weight:600;cursor:pointer;}
.risky-author:hover{color:var(--blue);}
.risky-bet{font-size:10px;font-family:monospace;color:var(--text3);text-decoration:none;}
.risky-bet:hover{color:var(--blue);}
.risky-status{font-size:11px;}
.risky-odds{font-size:14px;font-weight:800;color:var(--amber);}

/* в”Җв”Җ Pending в”Җв”Җ */
.pending-widget{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:1rem;}
.pending-widget-header{padding:10px 16px;background:var(--bg3);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.pending-widget-title{font-size:12px;font-weight:700;color:var(--text2);flex:1;}
.pending-widget-count{background:var(--border);color:var(--text3);font-size:11px;padding:2px 8px;border-radius:20px;}
.pending-widget-body{padding:8px 12px;display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;}
.pending-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg);border-radius:6px;}
.pending-flag{font-size:13px;}
.pending-author{font-size:11px;color:var(--text2);width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pending-chips-wrap{display:flex;flex-wrap:wrap;gap:3px;flex:1;}
.pending-chip{font-size:10px;font-family:monospace;padding:2px 5px;border-radius:3px;background:var(--bg3);color:var(--text3);text-decoration:none;}
.pending-chip:hover{color:var(--text2);}

/* в”Җв”Җ Matches CdM в”Җв”Җ */
.matches-widget{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem;}
.matches-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.matches-title{font-size:13px;font-weight:700;flex:1;}
.matches-refresh{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;}
.matches-refresh:hover{color:var(--blue);}
.matches-tabs{display:flex;border-bottom:1px solid var(--border);}
.matches-tab{flex:1;padding:7px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;}
.matches-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.matches-body{max-height:600px;overflow-y:auto;}
.match-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.match-row:last-child{border-bottom:none;}
.match-teams{flex:1;}
.match-team{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.match-team:last-child{margin-bottom:0;}
.match-team-name{font-size:12px;color:var(--text);font-weight:500;}
.match-team-score{font-size:14px;font-weight:800;color:var(--text);min-width:18px;text-align:center;}
.match-team-score.winner{color:var(--green);}
.match-status{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;white-space:nowrap;text-align:center;}
.match-status.live{background:rgba(239,68,68,.15);color:#ef4444;animation:pulse 1s infinite;}
.match-status.final{background:var(--bg3);color:var(--text3);}
.match-status.scheduled{background:rgba(96,165,250,.1);color:var(--blue);}
.match-prob-wrap{margin-top:5px;}
.match-prob{display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;}
.match-prob-bar{height:4px;}
.match-prob-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px;}

/* Top 20 */
.top20-selector{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.top20-select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.top20-select:focus{border-color:var(--blue);}
.top20-header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:1.5rem;display:flex;align-items:center;gap:16px;}
.top20-header-flag{font-size:40px;}
.top20-header-info{flex:1;}
.top20-header-name{font-size:24px;font-weight:900;}
.top20-header-sub{font-size:13px;color:var(--text3);margin-top:4px;}
.top20-header-stats{display:flex;gap:20px;margin-top:8px;}
.top20-header-stat{text-align:center;}
.top20-header-stat-val{font-size:20px;font-weight:800;}
.top20-header-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;}
.top20-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.top20-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:transform .2s;cursor:pointer;}
.top20-card:hover{transform:translateY(-2px);border-color:var(--blue);}
.top20-card.rank-1{border-color:#b8860b;background:linear-gradient(135deg,rgba(184,134,11,.08),var(--bg2));}
.top20-card.rank-2{border-color:#4a5568;background:linear-gradient(135deg,rgba(74,85,104,.08),var(--bg2));}
.top20-card.rank-3{border-color:#7b4a1a;background:linear-gradient(135deg,rgba(123,74,26,.08),var(--bg2));}
.top20-card-rank{font-size:22px;font-weight:900;color:var(--text3);min-width:36px;text-align:center;}
.top20-card-rank.medal{font-size:26px;}
.top20-card-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);overflow:hidden;flex-shrink:0;}
.top20-card-avatar img{width:100%;height:100%;object-fit:cover;}
.top20-card-info{flex:1;min-width:0;}
.top20-card-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top20-card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.top20-card-badges{display:flex;gap:3px;margin-top:3px;}
.top20-card-right{text-align:right;flex-shrink:0;}
.top20-card-won{font-size:24px;font-weight:900;color:var(--green);}
.top20-card-winrate{font-size:11px;color:var(--amber);margin-top:2px;}
.top20-card-total{font-size:10px;color:var(--text3);}
.top20-screenshot-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.top20-screenshot-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.top20-capture-area{background:var(--bg);}
.match-empty{padding:20px;text-align:center;color:var(--text3);font-size:12px;}

/* в”Җв”Җ Chart в”Җв”Җ */
.chart-container{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:1rem;}
.chart-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text2);}

/* в”Җв”Җ Records в”Җв”Җ */
.record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:1rem;}
.record-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.record-icon{font-size:28px;margin-bottom:8px;}
.record-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.record-value{font-size:18px;font-weight:800;color:var(--text);}
.record-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* в”Җв”Җ Profile в”Җв”Җ */
.profile-header{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:1rem;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.profile-avatar-big{width:72px;height:72px;border-radius:50%;background:var(--bg3);overflow:hidden;border:3px solid var(--border);flex-shrink:0;}
.profile-avatar-big img{width:100%;height:100%;object-fit:cover;}
.profile-info{flex:1;}
.profile-name{font-size:22px;font-weight:900;}
.profile-country{font-size:13px;color:var(--text3);margin-top:2px;}
.profile-badges-big{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.profile-badge{font-size:20px;}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.profile-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.profile-stat-val{font-size:22px;font-weight:800;}
.profile-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.profile-streak{background:linear-gradient(135deg,rgba(251,191,36,.08),var(--bg2));border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.streak-fire{font-size:32px;}
.streak-val{font-size:28px;font-weight:900;color:var(--amber);}
.streak-label{font-size:11px;color:var(--text3);}
.share-profile-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;}

/* в”Җв”Җ About в”Җв”Җ */
.about-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:1rem;}
.about-section h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--blue);}
.about-section p,.about-section li{font-size:13px;color:var(--text2);line-height:1.7;}
.about-section ul{padding-left:20px;}
.about-rule{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.about-rule:last-child{border-bottom:none;}
.about-rule-num{font-size:16px;font-weight:900;color:var(--blue);min-width:28px;}

/* в”Җв”Җ Recap в”Җв”Җ */
.recap-card{background:linear-gradient(135deg,#0f1923,#162330);border:1px solid var(--border);border-radius:12px;padding:20px;}
.recap-title{font-size:16px;font-weight:800;color:var(--amber);margin-bottom:12px;text-align:center;}
.recap-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;}
.recap-label{color:var(--text3);}
.recap-value{font-weight:700;color:var(--text);}

/* в”Җв”Җ Modals в”Җв”Җ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-size:15px;font-weight:700;flex:1;}
.modal-close{background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;}
.modal-body{padding:16px 20px;}
.follow-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text3);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;}
.follow-btn.following{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green);}

/* в”Җв”Җ Chat panneau в”Җв”Җ */
.chat-float-btn{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:20px;cursor:pointer;z-index:150;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.chat-float-btn:hover{background:var(--bg3);color:var(--text);}
.chat-float-btn.active{background:#1a9e6e;color:#fff;border-color:#1a9e6e;}
.chat-notif{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;padding:0 3px;display:none;align-items:center;justify-content:center;}
.chat-panel{position:fixed;top:0;right:0;width:320px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:148;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.3);}
.chat-panel.open{transform:translateX(0);}
.chat-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3);flex-shrink:0;}
.chat-panel-title{font-size:13px;font-weight:700;flex:1;}
.chat-panel-online{font-size:10px;color:var(--green);}
.chat-panel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0;line-height:1;}
.chat-panel-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.chat-panel-input{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.chat-panel-input input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);outline:none;}
.chat-panel-input input:focus{border-color:var(--blue);}
.chat-panel-send{background:#1a9e6e;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;}
.chat-pseudo-wrap{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;justify-content:center;}
.chat-pseudo-wrap p{font-size:12px;color:var(--text3);text-align:center;line-height:1.6;}
.chat-pseudo-wrap input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%;}
.chat-pseudo-wrap input:focus{border-color:var(--blue);}
.chat-pseudo-wrap button{background:#1a9e6e;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
.chat-msg{display:flex;gap:8px;align-items:flex-start;}
.chat-msg-av{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;}
.chat-msg-content{flex:1;}
.chat-msg-header{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.chat-msg-name{font-size:11px;font-weight:700;color:var(--blue);}
.chat-msg-name.own{color:var(--green);}
.chat-msg-time{font-size:10px;color:var(--text3);}
.chat-msg-text{font-size:12px;color:var(--text);word-break:break-word;}

/* в”Җв”Җ Suspense в”Җв”Җ */
.suspense-overlay{display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column;align-items:center;justify-content:center;}
.suspense-overlay.open{display:flex;}
.suspense-label{font-size:13px;color:var(--amber);text-transform:uppercase;letter-spacing:3px;margin-bottom:2rem;}
.suspense-rank{font-size:60px;font-weight:900;color:#fff;animation:reveal .5s ease;}
@keyframes reveal{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.suspense-name{font-size:26px;color:var(--green);margin-top:.5rem;}
.suspense-score{font-size:17px;color:var(--amber);margin-top:.25rem;}
.suspense-btn{margin-top:2rem;background:#1a9e6e;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.suspense-skip{margin-top:1rem;color:#555;font-size:12px;cursor:pointer;}

/* в”Җв”Җ Confetti в”Җв”Җ */
.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;border-radius:50%;animation:fall linear forwards;pointer-events:none;z-index:999;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* в”Җв”Җ Misc в”Җв”Җ */
.empty{text-align:center;padding:3rem 2rem;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:1rem;}
.error-banner{background:#2d0a0a;border:1px solid #7f1d1d;color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem;}
.loader{display:flex;align-items:center;justify-content:center;padding:3rem;gap:10px;color:var(--text3);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:#1a9e6e;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{background:var(--bg2);border-top:1px solid var(--border);padding:4px 1.5rem;font-size:11px;color:var(--text3);display:flex;gap:8px;flex-shrink:0;}

.lang-toggle{position:fixed;bottom:20px;left:20px;display:flex;gap:4px;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.lang-btn{background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--bg3);color:var(--text);}
.lang-btn:hover{color:var(--text);}
@media(max-width:900px){.sidebar{display:none;}.layout-2col{grid-template-columns:1fr;}.podium{grid-template-columns:1fr;}.widget-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.stats-bar{grid-template-columns:1fr 1fr;}.cashout-cell,.adjusted-cell,.void-cell{display:none;}.profile-stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">вҡҪ</span>
      <div>
        <div class="sidebar-logo-text">WCT 2026</div>
        <div class="sidebar-logo-sub">Stake World Chat Tournament</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section" data-fr="Navigation" data-en="Navigation"></div>
      <div class="sidebar-item active" onclick="setPage('global')" id="nav-global"><span class="sidebar-item-icon">рҹҢҚ</span><span class="sidebar-item-label" data-fr="Global" data-en="Global"></span></div>
      <div class="sidebar-item" onclick="setPage('joueurs')" id="nav-joueurs"><span class="sidebar-item-icon">рҹ‘Ө</span><span class="sidebar-item-label" data-fr="Joueurs" data-en="Players"></span></div>
      <div class="sidebar-item" onclick="setPage('stats')" id="nav-stats"><span class="sidebar-item-icon">рҹ“Ҡ</span><span class="sidebar-item-label" data-fr="Statistiques" data-en="Statistics"></span></div>
      <div class="sidebar-item" onclick="setPage('records')" id="nav-records"><span class="sidebar-item-icon">рҹҸҶ</span><span class="sidebar-item-label" data-fr="Records" data-en="Records"></span></div>
      <div class="sidebar-item" onclick="setPage('parisfolles')" id="nav-parisfolles"><span class="sidebar-item-icon">рҹҺІ</span><span class="sidebar-item-label" data-fr="Paris fous" data-en="Crazy bets"></span></div>
      <div class="sidebar-item" onclick="setPage('matchs')" id="nav-matchs"><span class="sidebar-item-icon">вҡҪ</span><span class="sidebar-item-label" data-fr="Matchs CdM" data-en="WC Matches"></span></div>
      <div class="sidebar-item" onclick="setPage('about')" id="nav-about"><span class="sidebar-item-icon">в„№пёҸ</span><span class="sidebar-item-label" data-fr="ГҖ propos" data-en="About"></span></div>
      <div class="sidebar-item" onclick="setPage('top20')" id="nav-top20"><span class="sidebar-item-icon">рҹҸ…</span><span class="sidebar-item-label" data-fr="Top 20" data-en="Top 20"></span></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section" data-fr="Chats" data-en="Chats"></div>
      <div class="sidebar-item" onclick="setPage('global')" id="nav-all"><span class="sidebar-item-icon">рҹҢҗ</span><span class="sidebar-item-label" data-fr="Tous les chats" data-en="All chats"></span></div>
      <div id="sidebar-countries"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="page-title">рҹҢҚ Classement Global</div>
        <span class="topbar-days" id="header-days"></span>
      </div>
      <div class="topbar-right">
        <span class="badge-live" id="live-badge" style="display:none">LIVE</span>
        <button class="btn btn-icon" onclick="toggleTheme()">рҹҢҷ</button>
        <button class="btn btn-icon" onclick="openShare()">рҹ“Ө</button>
        <button class="btn btn-icon" onclick="generateRecap()">рҹ“„</button>
        <button class="btn btn-green" id="btn-refresh" onclick="loadData()" data-fr="вҶ» Actualiser" data-en="вҶ» Refresh"></button>
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown-bar">
      <span class="cd-label" data-fr="вҸ° Fin du tournoi" data-en="вҸ° Tournament end"></span>
      <div class="cd-timer">
        <div class="cd-unit"><div class="cd-val" id="cd-days">--</div><div class="cd-ulabel" data-fr="jours" data-en="days"></div></div>
        <span class="cd-sep">:</span>
        <div class="cd-unit"><div class="cd-val" id="cd-hours">--</div><div class="cd-ulabel">h</div></div>
        <span class="cd-sep">:</span>
        <div class="cd-unit"><div class="cd-val" id="cd-mins">--</div><div class="cd-ulabel">min</div></div>
        <span class="cd-sep">:</span>
        <div class="cd-unit"><div class="cd-val" id="cd-secs">--</div><div class="cd-ulabel" data-fr="sec" data-en="sec"></div></div>
      </div>
    </div>

    <!-- Live bar -->
    <div class="live-bar" id="live-bar">
      <div class="live-bar-dot"></div>
      <span style="color:var(--text2)" data-fr="Scraping en cours вҖ”" data-en="Scraping in progress вҖ”"></span>
      <span style="color:var(--blue);font-weight:700" id="live-bar-val">0 bets</span>
      <span style="color:var(--text3)" data-fr="vГ©rifiГ©s" data-en="verified"></span>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-box"><div class="stat-value" style="color:var(--blue)" id="stat-chats">вҖ”</div><div class="stat-label" data-fr="Chats" data-en="Chats"></div></div>
      <div class="stat-box"><div class="stat-value" style="color:var(--green)" id="stat-won">вҖ”</div><div class="stat-label" data-fr="Gagnants" data-en="Winners"></div></div>
      <div class="stat-box"><div class="stat-value" style="color:var(--amber)" id="stat-total">вҖ”</div><div class="stat-label" data-fr="Total bets" data-en="Total bets"></div></div>
      <div class="stat-box"><div class="stat-value" id="stat-users">вҖ”</div><div class="stat-label" data-fr="Joueurs" data-en="Players"></div></div>
      <div class="stat-box"><div class="stat-value" style="color:var(--purple)" id="stat-winrate">вҖ”</div><div class="stat-label" data-fr="Win rate" data-en="Win rate"></div></div>
    </div>

    <!-- Toolbar (visible seulement sur global/country) -->
    <div class="toolbar" id="toolbar">
      <input class="search-input" id="search-input" id="search-input" placeholder="рҹ”Қ Rechercher..." oninput="renderCurrentPage()">
      <select class="filter-select" id="country-filter" onchange="renderCurrentPage()"><option value="" data-fr="Tous les pays" data-en="All countries"></option></select>
      <button class="btn btn-suspense" onclick="startSuspense()" data-fr="рҹҺӯ Suspense" data-en="рҹҺӯ Suspense"></button>
      <span class="toolbar-right" id="toolbar-count"></span>
    </div>

    <!-- Content -->
    <div class="page-content" id="page-content">
      <div class="empty"><div class="empty-icon">вҡҪ</div><p data-fr='Clique sur "Actualiser"' data-en='Click "Refresh"'></p></div>

    <!-- Status bar -->
    <div class="status-bar"><span id="status-text" data-fr="En attente..." data-en="Waiting..."></span><span>В·</span><span id="proxy-status">Proxy: ?</span></div>
  </div>
</div>

<div class="lang-toggle"><button class="lang-btn active" onclick="setLang('fr')">рҹҮ«рҹҮ· FR</button><button class="lang-btn" onclick="setLang('en')">рҹҮ¬рҹҮ§ EN</button></div>

<!-- Chat flottant -->
<button class="chat-float-btn" id="chat-float-btn" onclick="toggleChatPanel()" title="Chat en direct">
  рҹ’¬
  <div class="chat-notif" id="chat-notif-badge"></div>
</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span style="font-size:16px">рҹ’¬</span>
    <span class="chat-panel-title" data-fr="Chat en direct" data-en="Live chat"></span>
    <span class="chat-panel-online" id="chat-panel-online" data-fr="в—Ҹ en ligne" data-en="в—Ҹ online"></span>

  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="player-modal-title" data-fr="Joueur" data-en="Player"></div>
      <button id="follow-btn-modal" class="follow-btn" onclick="toggleFollow()" data-fr="+ Suivre" data-en="+ Follow"></button>
      <button class="modal-close" onclick="closePlayer()">вң•</button>

    <div class="modal-body" id="player-modal-body"></div>
  </div>

<!-- Share modal -->

  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-header"><div class="modal-title" data-fr="рҹ“Ө Partager" data-en="рҹ“Ө Share"></div><button class="modal-close" onclick="closeShare()">вң•</button></div>

      <div id="share-card-content" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px"><button class="btn btn-green" style="flex:1" onclick="copyShareText()" data-fr="рҹ“Ӣ Copier" data-en="рҹ“Ӣ Copy"></button><button class="btn btn-icon" onclick="closeShare()" data-fr="Fermer" data-en="Close"></button></div>

  </div>
</div>

  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:520px">
    <div class="modal-header"><div class="modal-title" data-fr="рҹ“„ RГ©cap du jour" data-en="рҹ“„ Daily recap"></div><button class="modal-close" onclick="closeRecap()">вң•</button></div>
    <div class="modal-body">
      <div id="recap-content"></div>
      <div style="display:flex;gap:8px;margin-top:12px">

        <button class="btn btn-icon" onclick="copyRecapText()" data-fr="рҹ“Ӣ Texte" data-en="рҹ“Ӣ Text"></button>
        <button class="btn btn-icon" onclick="closeRecap()" data-fr="Fermer" data-en="Close"></button>
      </div>
    </div>
  </div>
</div>

<!-- Suspense -->
<div class="suspense-overlay" id="suspense-overlay">
  <div class="suspense-label">рҹҸҶ Stake World Chat Tournament 2026</div>
  <div class="suspense-rank" id="suspense-rank"></div>

function getBetOfDay(lb){const today=new Date(),d=String(today.getDate()).padStart(2,'0'),m=String(today.getMonth()+1).padStart(2,'0'),y=today.getFullYear();const s=`${d}/${m}/${y}`;let best=null;for(const u of lb){for(const b of(u.bets||[])){if(b.status==='won'&&b.odds&&b.date&&b.date.includes(s)){if(!best||b.odds>best.odds)best={...b,author:u.author,country:u.country};}}}return best;}

async function fetchMatches(){
  try{
    const r=await fetch(`${PROXY}/world-cup-scores`,{headers:HEADERS});
    if(r.ok){const d=await r.json();matchesData=d.games||[];}
  }catch{}
  renderMatchesWidget();
  if(currentPage==='matchs')renderMatchesPageContent();
}

function renderMatchesPageContent(){
  const live=matchesData.filter(g=>g.status==='inprogress');
  const recent=matchesData.filter(g=>g.status==='final').reverse();
  const upcoming=matchesData.filter(g=>g.status==='scheduled');
  const games=matchesTab==='live'?live:matchesTab==='recent'?recent:upcoming;

  let html=`<div class="matches-widget" style="max-width:700px">
    <div class="matches-header">
      <span style="font-size:18px">вҡҪ</span>
      <span class="matches-title">Coupe du Monde 2026${live.length?` <span style="color:#ef4444;font-size:11px">в—Ҹ LIVE (${live.length})</span>`:''}</span>
      <button class="matches-refresh" onclick="fetchMatches()">вҶ» Actualiser</button>
    </div>
    <div class="matches-tabs">
      <div class="matches-tab ${matchesTab==='live'?'active':''}" onclick="setMatchesTab('live')">рҹ”ҙ Live${live.length?` (${live.length})`:''}</div>
      <div class="matches-tab ${matchesTab==='recent'?'active':''}" onclick="setMatchesTab('recent')">вң… RГ©sultats (${recent.length})</div>
      <div class="matches-tab ${matchesTab==='upcoming'?'active':''}" onclick="setMatchesTab('upcoming')">рҹ“… ГҖ venir (${upcoming.length})</div>
    </div>
    <div class="matches-body">`;

  if(!games.length){html+=`<div class="match-empty">${matchesTab==='live'?'Aucun match en cours':'Aucun match disponible'}</div>`;}
  else{
    games.forEach(g=>{
      const homeScore=g.score?.[g.home]??0,awayScore=g.score?.[g.away]??0;
      const homeName=g.teams?.[g.home]?.name||g.home,awayName=g.teams?.[g.away]?.name||g.away;
      const homeWin=g.status==='final'&&homeScore>awayScore,awayWin=g.status==='final'&&awayScore>homeScore;
      const isLive=g.status==='inprogress',isScheduled=g.status==='scheduled';
      let statusHtml='';
      if(isLive)statusHtml=`<span class="match-status live">LIVE</span>`;
      else if(isScheduled){const dt=new Date(g.start_time);statusHtml=`<div style="text-align:center"><div class="match-status scheduled">${dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div><div style="font-size:9px;color:var(--text3);margin-top:2px">${dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div></div>`;}
      else statusHtml=`<span class="match-status final">FT</span>`;
      html+=`<div class="match-row"><div class="match-teams"><div class="match-team"><span class="match-team-name">${getFlag(g.home)} ${esc(homeName)}</span>${!isScheduled?`<span class="match-team-score ${homeWin?'winner':''}">${homeScore}</span>`:''}</div><div class="match-team"><span class="match-team-name">${getFlag(g.away)} ${esc(awayName)}</span>${!isScheduled?`<span class="match-team-score ${awayWin?'winner':''}">${awayScore}</span>`:''}</div>${isScheduled&&g.win_probability?`<div class="match-prob-wrap"><div class="match-prob"><div class="match-prob-bar" style="width:${g.win_probability[g.home]||0}%;background:var(--blue);"></div><div class="match-prob-bar" style="width:${g.win_probability.draw||0}%;background:var(--text3);"></div><div class="match-prob-bar" style="width:${g.win_probability[g.away]||0}%;background:var(--purple);"></div></div><div class="match-prob-labels"><span>${g.win_probability[g.home]||0}%</span><span>nul ${g.win_probability.draw||0}%</span><span>${g.win_probability[g.away]||0}%</span></div></div>`:''}</div>${statusHtml}</div>`;
    });
  }
  html+=`</div></div>`;
  const container=document.getElementById('matches-page-container');
  if(container)container.innerHTML=html;
  else document.getElementById('page-content').innerHTML=`<div id="matches-page-container">${html}</div>`;
}

function generateRecap(){if(!data)return;const cl=data.countryLeaderboard||[],medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];const today=new Date().toLocaleDateString('fr-FR');const botd=getBetOfDay(data.leaderboard||[]);let html=`<div class="recap-card" id="recap-card"><div class="recap-title">вҡҪ Stake World Chat Tournament<br><span style="font-size:12px;font-weight:400;color:#94a3b8">${today}</span></div>`;cl.slice(0,5).forEach((c,i)=>html+=`<div class="recap-row"><span class="recap-label">${medals[i]||`#${i+1}`} ${c.flag} ${c.name}</span><span class="recap-value" style="color:#4ade80">${c.wonBets}</span></div>`);html+=`<div class="recap-row"><span class="recap-label">рҹ“Ҡ Global</span><span class="recap-value">${data.totalWon?.toLocaleString()} / ${data.totalBets?.toLocaleString()}</span></div><div class="recap-row"><span class="recap-label">рҹҺҜ Win rate</span><span class="recap-value" style="color:#fbbf24">${pct(data.totalWon,data.totalBets)}%</span></div>`;if(botd)html+=`<div class="recap-row"><span class="recap-label">вӯҗ Bet of the Day</span><span class="recap-value" style="color:#fbbf24">${esc(botd.author)} Г—${botd.odds}</span></div>`;html+=`<div style="text-align:center;margin-top:12px;font-size:10px;color:#64748b">StakePulse Tournament Dashboard</div></div>`;document.getElementById('recap-content').innerHTML=html;document.getElementById('recap-overlay').classList.add('open');}
function closeRecap(){document.getElementById('recap-overlay').classList.remove('open');}
async function downloadRecap(){const card=document.getElementById('recap-card');if(!card)return;const canvas=await html2canvas(card,{backgroundColor:'#0f1923',scale:2});const a=document.createElement('a');a.download=`recap-${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.png`;a.href=canvas.toDataURL();a.click();}
function copyRecapText(){const cl=data?.countryLeaderboard||[],medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];let t=`вҡҪ WCT 2026 вҖ” ${new Date().toLocaleDateString('fr-FR')}\n`;cl.slice(0,3).forEach((c,i)=>t+=`${medals[i]} ${c.flag} ${c.name} : ${c.wonBets}\n`);navigator.clipboard.writeText(t).then(()=>{event.target.textContent='вң…';setTimeout(()=>event.target.textContent='рҹ“Ӣ Texte',2000);});}

// Notifications
async function checkNotificationPermission(){if('Notification'in window&&Notification.permission==='default')await Notification.requestPermission();}
function sendNotification(msg){if('Notification'in window&&Notification.permission==='granted')new Notification('вҡҪ WCT 2026',{body:msg});}
function copyToClipboard(text,btn){navigator.clipboard.writeText(text).then(()=>{const orig=btn.textContent;btn.textContent='вң… CopiГ© !';setTimeout(()=>btn.textContent=orig,2000);});}

fetchMatches();
